<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de productos</title>
</head>
<body>
  <h1>API REST Productos</h1>
  <section class="crud">
    <article>
      <h2 class="crud-title">Agregar Producto</h2>
      <form action="POST" class="crud-form">
        <input type="text" name="name" id="name" placeholder="Nombre del producto" required>
        <input type="number" name="price" id="price" placeholder="0" required>
        <input type="number" name="stock" id="stock" placeholder="0" required>
        <input type="submit" value="Agregar producto">
      </form>
    </article>
    <article>
      
    </article>
  </section>
</body>
</html>
