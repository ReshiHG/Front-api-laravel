<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Agregamos Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="assets/css/style.css">
    <title>Gestión de productos</title>
  </head>
  <body>
    <div class="web-title">
      <h1>API REST Productos</h1>
    </div>
    <section class="crud">
      <article>
        <h2 class="crud-title">Agregar Producto</h2>
        <form class="crud-form">
          <input
            type="text"
            name="name"
            id="name"
            placeholder="Nombre del producto"
            required
          />
          <br />
          <input
            type="number"
            name="price"
            id="price"
            placeholder="Precio"
            required
          />
          <br />
          <input
            type="number"
            name="stock"
            id="stock"
            placeholder="Stock"
            required
          />
          <br />
          <input type="submit" value="Enviar" />
          <input type="hidden" name="id" />
        </form>
      </article>
      <article>
        <h2 class="crud-title">Productos</h2>
        <table class="crud-table">
          <thead>
            <tr>
              <th>Producto</th>
              <th>Precio</th>
              <th>Stock</th>
              <th>Acción</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </article>
    </section>

    <template id="crud-template">
      <tr>
        <td class="productName"></td>
        <td class="productPrice"></td>
        <td class="productStock"></td>
        <td>
          <button class="productButtonEdit">Editar</button>
          <button class="productButtonDelete">Eliminar</button>
        </td>
      </tr>
    </template>
  </body>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  <script src="assets/js/app.js"></script>

</html>
